<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集 | 懒家伙</title>
    <meta name="description" content="懒家伙的 vib coding 作品展示 - 创意编程、工具应用、UI组件">

    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/x-icon.css">

    <!-- 样式 -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cyberpunk.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/projects.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <!-- 扫描线效果 -->
    <div class="scanlines"></div>

    <!-- 背景网格 -->
    <div class="grid-bg"></div>

    <!-- 导航栏 -->
    <nav class="cyber-nav">
        <div class="nav-brand">
            <span class="glitch" data-text="懒家伙">懒家伙</span>
            <span class="terminal-cursor">_</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">
                <span class="link-text">首页</span>
                <span class="link-decoration">//</span>
            </a>
            <a href="projects.html" class="nav-link active">
                <span class="link-text">作品集</span>
                <span class="link-decoration">//</span>
            </a>
            <a href="blog.html" class="nav-link">
                <span class="link-text">博客</span>
                <span class="link-decoration">//</span>
            </a>
            <a href="about.html" class="nav-link">
                <span class="link-text">关于我</span>
                <span class="link-decoration">//</span>
            </a>
        </div>
        <div class="nav-controls">
            <button class="cyber-btn theme-toggle" id="themeToggle">
                <i class="fas fa-adjust"></i>
            </button>
            <button class="cyber-btn mobile-menu" id="mobileMenu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <section class="projects-header">
            <div class="header-content">
                <h1 class="page-title">
                    <span class="title-decoration">&lt;</span>
                    作品集
                    <span class="title-decoration">/&gt;</span>
                </h1>
                <p class="page-description">
                    探索我的 vib coding 作品，包括创意编程、工具应用和UI组件。
                    每个项目都代表着我对技术与艺术结合的探索。
                </p>
            </div>
        </section>

        <!-- 筛选器 -->
        <section class="projects-filters-section">
            <div class="filters-container">
                <div class="project-filters">
                    <!-- 筛选按钮将通过 JavaScript 动态生成 -->
                </div>
                <div class="view-options">
                    <button class="view-btn active" data-view="grid" title="网格视图">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="view-btn" data-view="list" title="列表视图">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- 项目列表 -->
        <section class="projects-list-section">
            <div class="projects-grid">
                <!-- 项目卡片将通过 JavaScript 动态加载 -->
                <div class="project-card loading">
                    <div class="card-placeholder">
                        <div class="placeholder-image"></div>
                        <div class="placeholder-text"></div>
                        <div class="placeholder-text short"></div>
                    </div>
                </div>
                <div class="project-card loading">
                    <div class="card-placeholder">
                        <div class="placeholder-image"></div>
                        <div class="placeholder-text"></div>
                        <div class="placeholder-text short"></div>
                    </div>
                </div>
                <div class="project-card loading">
                    <div class="card-placeholder">
                        <div class="placeholder-image"></div>
                        <div class="placeholder-text"></div>
                        <div class="placeholder-text short"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 项目统计 -->
        <section class="projects-stats">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-project-diagram"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalProjects">0</span>
                        <span class="stat-label">总项目数</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="featuredProjects">0</span>
                        <span class="stat-label">精选项目</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-code"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalTechnologies">0</span>
                        <span class="stat-label">技术栈</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="lastUpdate">-</span>
                        <span class="stat-label">最近更新</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 项目详情模态框 -->
    <div class="project-modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-body">
                <!-- 模态框内容将通过 JavaScript 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="cyber-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="glitch" data-text="懒家伙">懒家伙</span>
                <p class="footer-tagline">创意开发者 & Vib Coding 探索者</p>
            </div>
            <div class="footer-links" id="footerLinks">
                <!-- 动态生成 -->
            </div>
            <div class="footer-copyright">
                <p>&copy; 2026 懒家伙. 保留所有权利。</p>
                <p class="cyber-text">使用 ❤️ 和代码构建</p>
            </div>
        </div>
    </footer>

    <!-- 脚本 -->
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/projects-page.js"></script>
    <script>
        // 加载页脚社交链接
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const profile = await getProfile();
                if (profile) {
                    const footerLinks = document.getElementById('footerLinks');
                    const links = [];

                    if (profile.github) {
                        links.push(`<a href="${profile.github}" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i></a>`);
                    }
                    if (profile.twitter) {
                        links.push(`<a href="${profile.twitter}" target="_blank" rel="noopener noreferrer"><i class="x-icon"></i></a>`);
                    }
                    if (profile.linkedin) {
                        links.push(`<a href="${profile.linkedin}" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i></a>`);
                    }
                    if (profile.email) {
                        links.push(`<a href="mailto:${profile.email}"><i class="fas fa-envelope"></i></a>`);
                    }

                    footerLinks.innerHTML = links.join('') || '';
                }
            } catch (error) {
                console.error('加载社交链接失败:', error);
            }
        });
    </script>
</body>
</html>
